name: Cron cache-cleanup job

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

concurrency:
  group: cron-cache-cleanup-${{ github.event_name }}-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  cache-cleanup:
    name: Run cache-cleanup cron
    runs-on: ubuntu-latest
    env:
      CRON_BASE_URL: ${{ vars.CRON_BASE_URL }}
    steps:
      - name: Validate base URL
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CRON_BASE_URL:-}" ]; then
            echo "CRON_BASE_URL is not set."
            exit 1
          fi

      - name: Request cache-cleanup cron
        shell: bash
        run: |
          set -euo pipefail
          # Edge hosts can reset the connection after the JSON response is already sent.
          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT
          http_code="$(
            curl --silent --show-error \
            --http1.1 \
            --connect-timeout 10 \
            --max-time 120 \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 2 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            "${CRON_BASE_URL%/}/api/cron/cache-cleanup" || true
          )"

          if [ "$http_code" = "200" ] && grep -Fq "Cache cleanup scheduled." "$response_file"; then
            exit 0
          fi

          cat "$response_file"
          exit 1
